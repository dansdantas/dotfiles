# Enables caching for all streams (file, network, etc.)
cache=yes

# Memory cache size in KiB (default ~25MB)
# Use larger if you have enough RAM.
cache-size=2000000   # ~2 GB

# For network (HTTP, yt-dlp, etc.)
demuxer-max-bytes=500MiB
demuxer-readahead-secs=60

# Preload more data into RAM before playback
cache-pause=yes
cache-pause-wait=10

# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$mod = ALT

# menus
bindd = $mod, SPACE, Launch apps, exec, walker -p "Start…"
bindd = $mod SHIFT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = $mod, ESCAPE, Power menu, exec, omarchy-menu system
bindd = $mod, Tab, Windows, exec, hyprctl clients -j | jq -r '.[] | "\(.address)\t\(.initialTitle)"' | walker -d | awk '{print "address:" $1}' | xargs -r hyprctl dispatch focuswindow

# apps
bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password
bindd = SUPER SHIFT, Space, Passwords, exec, uwsm app -- 1password --quick-access
# bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

bind = SUPER ALT, T, exec, ~/.local/bin/toggle-term

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# Focus movement
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

# Move focused window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Move active window to a workspace with SUPER + SHIFT + [0-9]
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# bindd = $mod, TAB, Next workspace, workspace, e+1
# bindd = $mod SHIFT, TAB, Previous workspace, workspace, e-1
# bindd = $mod CTRL, TAB, Former workspace, workspace, previous

unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, TAB

# unbinds
unbind = SUPER, P
unbind = SUPER, J
unbind = SUPER, W
unbind = SUPER, V
unbind = SUPER, K
unbind = SUPER, T
unbind = SUPER SHIFT, SPACE

unbind = SHIFT, F11
unbind = ALT, F11

unbind = SUPER, left
unbind = SUPER, right
unbind = SUPER, up
unbind = SUPER, down

unbind = SUPER, ESCAPE
unbind = $mod, return

# actions
bindd = $mod, Q, Close active window, killactive
bindd = $mod SHIFT, Q, Close all Windows, exec, omarchy-cmd-close-all-windows
bindd = $mod SHIFT, R, Reload, exec, hyprctl reload

# bindd = SUPER SHIFT, P, Pseudo window, pseudo, # dwindle
# bindd = SUPER SHIFT, V, Toggle floating, togglefloating,

bindd = $mod, slash, Toggle split, togglesplit
bindd = $mod, F, Full width, fullscreen, 1
bindd = $mod SHIFT, F, Force full screen, fullscreen, 0
bindd = $mod SHIFT, P, Pseudo window, pseudo, # dwindle

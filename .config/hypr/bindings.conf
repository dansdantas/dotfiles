# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$mod = ALT

# source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
# Copy / Paste
# bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
# bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
# bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,
# bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
# Close windows
unbind = SUPER, W #, Close window, killactive,
unbind = CTRL ALT, DELETE #, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
unbind = SUPER, J #, Toggle window split, togglesplit, # dwindle
unbind = SUPER, P #, Pseudo window, pseudo, # dwindle
unbind = SUPER, T #, Toggle window floating/tiling, togglefloating,
unbind = SUPER, F #, Full screen, fullscreen, 0
unbind = SUPER CTRL, F #, Tiled full screen, fullscreenstate, 0 2
unbind = SUPER ALT, F #, Full width, fullscreen, 1
unbind = SUPER, O #, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Move focus with SUPER + arrow keys
unbind = SUPER, LEFT #, Move focus left, movefocus, l
unbind = SUPER, RIGHT #, Move focus right, movefocus, r
unbind = SUPER, UP #, Move focus up, movefocus, u
unbind = SUPER, DOWN #, Move focus down, movefocus, d

# Switch workspaces with SUPER + [0-9]
unbind = SUPER, code:10 #, Switch to workspace 1, workspace, 1
unbind = SUPER, code:11 #, Switch to workspace 2, workspace, 2
unbind = SUPER, code:12 #, Switch to workspace 3, workspace, 3
unbind = SUPER, code:13 #, Switch to workspace 4, workspace, 4
unbind = SUPER, code:14 #, Switch to workspace 5, workspace, 5
unbind = SUPER, code:15 #, Switch to workspace 6, workspace, 6
unbind = SUPER, code:16 #, Switch to workspace 7, workspace, 7
unbind = SUPER, code:17 #, Switch to workspace 8, workspace, 8
unbind = SUPER, code:18 #, Switch to workspace 9, workspace, 9
unbind = SUPER, code:19 #, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
unbind = SUPER SHIFT, code:10 #, Move window to workspace 1, movetoworkspace, 1
unbind = SUPER SHIFT, code:11 #, Move window to workspace 2, movetoworkspace, 2
unbind = SUPER SHIFT, code:12 #, Move window to workspace 3, movetoworkspace, 3
unbind = SUPER SHIFT, code:13 #, Move window to workspace 4, movetoworkspace, 4
unbind = SUPER SHIFT, code:14 #, Move window to workspace 5, movetoworkspace, 5
unbind = SUPER SHIFT, code:15 #, Move window to workspace 6, movetoworkspace, 6
unbind = SUPER SHIFT, code:16 #, Move window to workspace 7, movetoworkspace, 7
unbind = SUPER SHIFT, code:17 #, Move window to workspace 8, movetoworkspace, 8
unbind = SUPER SHIFT, code:18 #, Move window to workspace 9, movetoworkspace, 9
unbind = SUPER SHIFT, code:19 #, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
unbind = SUPER SHIFT ALT, code:10 #, Move window silently to workspace 1, movetoworkspacesilent, 1
unbind = SUPER SHIFT ALT, code:11 #, Move window silently to workspace 2, movetoworkspacesilent, 2
unbind = SUPER SHIFT ALT, code:12 #, Move window silently to workspace 3, movetoworkspacesilent, 3
unbind = SUPER SHIFT ALT, code:13 #, Move window silently to workspace 4, movetoworkspacesilent, 4
unbind = SUPER SHIFT ALT, code:14 #, Move window silently to workspace 5, movetoworkspacesilent, 5
unbind = SUPER SHIFT ALT, code:15 #, Move window silently to workspace 6, movetoworkspacesilent, 6
unbind = SUPER SHIFT ALT, code:16 #, Move window silently to workspace 7, movetoworkspacesilent, 7
unbind = SUPER SHIFT ALT, code:17 #, Move window silently to workspace 8, movetoworkspacesilent, 8
unbind = SUPER SHIFT ALT, code:18 #, Move window silently to workspace 9, movetoworkspacesilent, 9
unbind = SUPER SHIFT ALT, code:19 #, Move window silently to workspace 10, movetoworkspacesilent, 10

# Control scratchpad
unbind = SUPER, S #, Toggle scratchpad, togglespecialworkspace, scratchpad
unbind = SUPER ALT, S #, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces
unbind = SUPER, TAB #, Next workspace, workspace, e+1
unbind = SUPER SHIFT, TAB #, Previous workspace, workspace, e-1
unbind = SUPER CTRL, TAB #, Former workspace, workspace, previous

# Move workspaces to other monitors
unbind = SUPER SHIFT ALT, LEFT #, Move workspace to left monitor, movecurrentworkspacetomonitor, l
unbind = SUPER SHIFT ALT, RIGHT #, Move workspace to right monitor, movecurrentworkspacetomonitor, r
unbind = SUPER SHIFT ALT, UP #, Move workspace to up monitor, movecurrentworkspacetomonitor, u
unbind = SUPER SHIFT ALT, DOWN #, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
unbind = SUPER SHIFT, LEFT #, Swap window to the left, swapwindow, l
unbind = SUPER SHIFT, RIGHT #, Swap window to the right, swapwindow, r
unbind = SUPER SHIFT, UP #, Swap window up, swapwindow, u
unbind = SUPER SHIFT, DOWN #, Swap window down, swapwindow, d

# Cycle through applications on active workspace
unbind = ALT, TAB #, Cycle to next window, cyclenext
unbind = ALT SHIFT, TAB #, Cycle to prev window, cyclenext, prev
unbind = ALT, TAB #, Reveal active window on top, bringactivetotop
unbind = ALT SHIFT, TAB #, Reveal active window on top, bringactivetotop

# Resize active window
unbind = SUPER, code:20 #, Expand window left, resizeactive, -100 0    # - key
unbind = SUPER, code:21 #, Shrink window left, resizeactive, 100 0     # = key
unbind = SUPER SHIFT, code:20 #, Shrink window up, resizeactive, 0 -100
unbind = SUPER SHIFT, code:21 #, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
unbind = SUPER, mouse_down #, Scroll active workspace forward, workspace, e+1
unbind = SUPER, mouse_up #, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
unbindmd = SUPER, mouse:272 #, Move window, movewindow
unbindmd = SUPER, mouse:273 #, Resize window, resizewindow

# Toggle groups
unbind = SUPER, G #, Toggle window grouping, togglegroup
unbind = SUPER ALT, G #, Move active window out of group, moveoutofgroup

# Join groups
unbind = SUPER ALT, LEFT #, Move window to group on left, moveintogroup, l
unbind = SUPER ALT, RIGHT #, Move window to group on right, moveintogroup, r
unbind = SUPER ALT, UP #, Move window to group on top, moveintogroup, u
unbind = SUPER ALT, DOWN #, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
unbind = SUPER ALT, TAB #, Next window in group, changegroupactive, f
unbind = SUPER ALT SHIFT, TAB #, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
unbind = SUPER CTRL, LEFT #, Move grouped window focus left, changegroupactive, b
unbind = SUPER CTRL, RIGHT #, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with SUPER + ALT + scroll
unbind = SUPER ALT, mouse_down #, Next window in group, changegroupactive, f
unbind = SUPER ALT, mouse_up #, Previous window in group, changegroupactive, b

# Activate window in a group by number
unbind = SUPER ALT, code:10 #, Switch to group window 1, changegroupactive, 1
unbind = SUPER ALT, code:11 #, Switch to group window 2, changegroupactive, 2
unbind = SUPER ALT, code:12 #, Switch to group window 3, changegroupactive, 3
unbind = SUPER ALT, code:13 #, Switch to group window 4, changegroupactive, 4
unbind = SUPER ALT, code:14 #, Switch to group window 5, changegroupactive, 5

# source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
# Menus
# bindd = SUPER, SPACE, Launch apps, exec, omarchy-launch-walker
unbind = SUPER CTRL, E#, Emoji picker, exec, omarchy-launch-walker -m symbols
unbind = SUPER ALT, SPACE#, Omarchy menu, exec, omarchy-menu
unbind = SUPER, ESCAPE #, System menu, exec, omarchy-menu system
# bindld = , XF86PowerOff, Power menu, exec, omarchy-menu system
# bindd = SUPER, K, Show key bindings, exec, omarchy-menu-keybindings
# bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
unbind = SUPER SHIFT, SPACE #, Toggle top bar, exec, omarchy-toggle-waybar
# bindd = SUPER CTRL, SPACE, Next background in theme, exec, omarchy-theme-bg-next
# bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, omarchy-menu theme
# bindd = SUPER, BACKSPACE, Toggle window transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
# bindd = SUPER SHIFT, BACKSPACE, Toggle workspace gaps, exec, omarchy-hyprland-workspace-toggle-gaps

# Notifications
# bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
# bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
# bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, makoctl mode -t do-not-disturb && makoctl mode | grep -q 'do-not-disturb' && notify-send "Silenced notifications" || notify-send "Enabled notifications"
# bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
# bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggle idling
# bindd = SUPER CTRL, I, Toggle locking on idle, exec, omarchy-toggle-idle

# Toggle nightlight
# bindd = SUPER CTRL, N, Toggle nightlight, exec, omarchy-toggle-nightlight

# Control Apple Display brightness
unbind = CTRL, F1 #, Apple Display brightness down, exec, omarchy-cmd-apple-display-brightness -5000
unbind = CTRL, F2 #, Apple Display brightness up, exec, omarchy-cmd-apple-display-brightness +5000
unbind = SHIFT CTRL, F2 #, Apple Display full brightness, exec, omarchy-cmd-apple-display-brightness +60000

# Captures
# bindd = , PRINT, Screenshot with editing, exec, omarchy-cmd-screenshot
# bindd = SHIFT, PRINT, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
# bindd = ALT, PRINT, Screenrecording, exec, omarchy-menu screenrecord
# bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# File sharing
# bindd = SUPER CTRL, S, Share, exec, omarchy-menu share

# Waybar-less information
# bindd = SUPER CTRL ALT, T, Show time, exec, notify-send "    $(date +"%A %H:%M  —  %d %B W%V %Y")"
# bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send "󰁹    Battery is at $(omarchy-battery-remaining)%"

# Control panels
# bindd = SUPER CTRL, A, Audio controls, exec, omarchy-launch-audio
# bindd = SUPER CTRL, B, Bluetooth controls, exec, omarchy-launch-bluetooth
# bindd = SUPER CTRL, W, Wifi controls, exec, omarchy-launch-wifi
# bindd = SUPER CTRL, T, Activity, exec, omarchy-launch-tui btop

# Dictation
unbind  = SUPER CTRL, X #, Start dictation, exec, voxtype record start
unbindr = SUPER CTRL, X #, Stop dictation, exec, voxtype record stop

# Lock system
unbind = SUPER CTRL, L #, Lock system, exec, omarchy-lock-screen

# menus
bindd = $mod, SPACE, Launch apps, exec, walker -p "Start…"
bindd = $mod SHIFT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = $mod, ESCAPE, Power menu, exec, omarchy-menu system

bindd = $mod, Tab, Windows, exec, hyprctl clients -j | jq -r '.[] | "\(.address)\t\(.initialTitle)"' | walker -d | awk '{print "address:" $1}' | xargs -r hyprctl dispatch focuswindow
bindd = $mod CTRL, TAB, Cycle to next window, cyclenext

# apps
bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password
bindd = SUPER SHIFT, Space, Passwords, exec, uwsm app -- 1password --quick-access
# bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

bind = SUPER ALT, T, exec, ~/.local/bin/toggle-term

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Focus movement
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move focused window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# actions
bindd = $mod, Q, Close active window, killactive
bindd = $mod SHIFT, Q, Close all Windows, exec, omarchy-cmd-close-all-windows
bindd = $mod SHIFT, R, Reload, exec, hyprctl reload

bindd = $mod, slash, Toggle split, togglesplit
bindd = $mod, F, Full width, fullscreen, 1
bindd = $mod SHIFT, F, Force full screen, fullscreen, 0
bindd = $mod SHIFT, P, Pseudo window, pseudo, # dwindle

# Lock system
bindd = $mod CTRL, L, Lock system, exec, omarchy-lock-screen
